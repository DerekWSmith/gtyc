# /etc/nginx/servers/gtyc.conf  (or /usr/local/etc/nginx/servers/ on macOS Homebrew)
#
# Nginx reverse-proxy for GTYC Django/Gunicorn.
# Cloudflare Tunnel points at http://localhost:7030
# Gunicorn binds to a Unix socket; Nginx listens on :7030.

upstream gtyc_app {
    server unix:/Volumes/Macintosh\ HD\ -\ Data/usr/local/var/www/gtyc/run/gunicorn.sock fail_timeout=0;
}

server {
    listen 7030;
    server_name _;

    # ── Logging ──────────────────────────────────────────────────
    access_log /Volumes/Macintosh\ HD\ -\ Data/usr/local/var/www/gtyc/logs/nginx-access.log;
    error_log  /Volumes/Macintosh\ HD\ -\ Data/usr/local/var/www/gtyc/logs/nginx-error.log;

    # ── Max upload (for future file uploads) ─────────────────────
    client_max_body_size 10M;

    # ── Static files ─────────────────────────────────────────────
    # WhiteNoise serves static via Django, but this direct alias
    # is more efficient for Nginx to handle.
    location /static/ {
        alias /Volumes/Macintosh\ HD\ -\ Data/usr/local/var/www/gtyc/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy everything else to Gunicorn ────────────────────────
    location / {
        proxy_pass http://gtyc_app;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect   off;

        # Cloudflare tunnel may send these — pass them through
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_set_header CF-Ray           $http_cf_ray;
    }
}
