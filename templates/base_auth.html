{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GTYC{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }
        .auth-logo { max-height: 200px; }
        @media (max-width: 576px) {
            .auth-logo { max-height: 120px; }
            .auth-banner { max-height: 100px; object-fit: cover; }
        }
    </style>
</head>
<body>

    <!-- Banner across the top -->
    <div class="text-center">
        <img src="{% static 'GYTCImages/Banner.png' %}" alt="GTYC" class="img-fluid auth-banner">
    </div>

    <div class="container px-3">
        <!-- Centred logo -->
        <div class="row justify-content-center">
            <div class="col-auto text-center mt-3 mt-sm-4 mb-2 mb-sm-3">
                <img src="{% static 'GYTCImages/NewLogo.png' %}"
                     alt="GTYC Logo"
                     class="auth-logo">
                <h3 class="mt-2 mt-sm-3">Welcome to GTYC</h3>
            </div>
        </div>

        <!-- Login card -->
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-6 col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body p-3 p-sm-4">
                        {% block content %}{% endblock %}
                    </div>
                </div>
                <div class="text-center mt-3">
                    {% block footer %}{% endblock %}
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
